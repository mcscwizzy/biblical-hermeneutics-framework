name: Behavioral eval (manual)

# Behavioral evaluations score interpretive METHOD, not doctrine. They are
# optional and run only on manual dispatch so required CI never depends on a
# model API key or any specific vendor. See tests/README.md.

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Optional note for this eval run"
        required: false
        default: ""

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling dependencies
        run: pip install -r tools/requirements.txt

      - name: Validate JSON fixtures and rubrics
        run: |
          python -m json.tool tests/prompts/proverbs-context-basic.json >/dev/null
          python -m json.tool tests/rubrics/local-eval-sample.json >/dev/null

      - name: Run sample saved-answer eval
        run: |
          cat > /tmp/bhf-sample-answer.txt <<'EOF'
          Proverbs is wisdom literature. A proverb is not a mechanical promise.
          Start with genre and context before moving to application.
          EOF
          python tools/eval_local.py \
            --fixture tests/prompts/proverbs-context-basic.json \
            --answer-file /tmp/bhf-sample-answer.txt
