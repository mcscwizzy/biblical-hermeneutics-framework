<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BHF Agent Local UI</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
  <script src="{{ url_for('static', path='/htmx-lite.js') }}" defer></script>
</head>
<body>
  <main class="page">
    <header class="header">
      <h1>BHF Agent</h1>
      <p>Local UI for asking your configured OpenAI-compatible model through the existing BHF Agent pipeline.</p>
    </header>

    {% if config_warning %}
      <div class="notice" role="status">{{ config_warning }}</div>
    {% endif %}

    <section class="layout">
      <form
        class="ask-form"
        method="post"
        action="/ask"
        data-job-post="/ask/jobs"
        data-status-base="/ask/status/"
        data-result-base="/ask/result/"
        data-target="#answer-panel"
        data-status-target="#status-panel"
      >
        <label class="full">
          <span>Question</span>
          <textarea name="question" rows="8" required>{{ form.question }}</textarea>
        </label>

        <label>
          <span>Profile</span>
          <select name="profile">
            {% for profile in profiles %}
              <option value="{{ profile }}" {% if profile == form.profile %}selected{% endif %}>{{ profile }}</option>
            {% endfor %}
          </select>
        </label>

        <label>
          <span>Answer mode</span>
          <select name="answer_mode">
            {% for mode in answer_modes %}
              <option value="{{ mode }}" {% if mode == form.answer_mode %}selected{% endif %}>{{ mode }}</option>
            {% endfor %}
          </select>
        </label>

        <label>
          <span>Model</span>
          <input type="text" name="model" value="{{ form.model }}" required>
        </label>

        <label>
          <span>Base URL</span>
          <input type="url" name="base_url" value="{{ form.base_url }}" required>
        </label>

        <label>
          <span>Temperature</span>
          <input type="number" name="temperature" min="0" max="2" step="0.1" value="{{ form.temperature }}" required>
        </label>

        <label>
          <span>Max tokens</span>
          <input type="number" name="max_tokens" min="1" step="1" value="{{ form.max_tokens }}" required>
        </label>

        <label>
          <span>Timeout seconds</span>
          <input type="number" name="timeout_seconds" min="1" step="1" value="{{ form.timeout_seconds }}" required>
        </label>

        <label class="check full">
          <input type="checkbox" name="show_method_notes" {% if form.show_method_notes %}checked{% endif %}>
          <span>Show method notes</span>
        </label>

        <fieldset class="full">
          <legend>Local session memory</legend>
          <label class="check">
            <input type="checkbox" name="memory_enabled" {% if form.memory_enabled %}checked{% endif %}>
            <span>Enable memory</span>
          </label>

          <div class="grid">
            <label>
              <span>Session ID</span>
              <input type="text" name="session_id" value="{{ form.session_id }}">
            </label>
            <label>
              <span>Memory path</span>
              <input type="text" name="memory_path" value="{{ form.memory_path }}">
            </label>
            <label>
              <span>Memory max turns</span>
              <input type="number" name="memory_max_turns" min="1" step="1" value="{{ form.memory_max_turns }}">
            </label>
          </div>
        </fieldset>

        <button type="submit">Ask BHF</button>
      </form>

      <div class="result-column">
        <section id="status-panel" class="status-panel" aria-live="polite" hidden>
          <div class="status-summary" hidden></div>
          <div class="status-active">
            <div class="status-topline">
              <div>
                <div class="status-heading">Agent status</div>
                <div class="status-current">Preparing request</div>
              </div>
            </div>
          </div>
        </section>

        <section id="answer-panel" class="answer-panel" aria-live="polite">
          <p class="empty">Submit a question to see the answer and run metadata.</p>
        </section>
      </div>
    </section>
  </main>
</body>
</html>
