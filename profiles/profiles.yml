# Named profiles: curated module sets for tools/compose.py.
# Transitive `requires` are resolved automatically; list the modules you want
# foregrounded. Regenerate the committed .md artifacts with:
#   python tools/compose.py --profile <name> --write

profiles:
  minimal-7b:
    description: >-
      Smallest viable method prompt for tiny local models (~3B-7B). Core
      posture only: genre-first, observe/interpret/apply, label confidence.
    modules:
      - core.core-framework
      - core.genre-awareness
      - core.observe-interpret-apply
      - core.epistemic-humility

  standard:
    description: >-
      Balanced, genre-agnostic method for most use. The full core discipline
      in workflow order. Add a genre/book module (e.g. genre.epistle,
      book.romans) for a specific study.
    modules:
      - core.core-framework
      - core.genre-awareness
      - core.original-audience
      - core.observe-interpret-apply
      - core.intertextuality
      - core.epistemic-humility
      - core.anti-hallucination

  scholar:
    description: >-
      Full-depth assembly for frontier models with large context windows: the
      entire reusable framework (all core, genre, and context modules plus
      original-language guidance). Token-heavy by design; for a specific book,
      add its book module. Genre and context modules are conditional — apply the
      ones the passage calls for.
    modules:
      # core (all seven, workflow-ordered by `order`)
      - core.core-framework
      - core.genre-awareness
      - core.original-audience
      - core.observe-interpret-apply
      - core.intertextuality
      - core.epistemic-humility
      - core.anti-hallucination
      # genre (all eight)
      - genre.narrative
      - genre.poetry
      - genre.wisdom
      - genre.prophecy
      - genre.gospel
      - genre.apocalyptic
      - genre.epistle
      - genre.law
      # context (all eleven)
      - context.ancient-near-east
      - context.second-temple-judaism
      - context.roman-empire
      - context.temple
      - context.covenant
      - context.honor-shame
      - context.patronage
      - context.israelite-monarchy
      - context.exile-and-restoration
      - context.greco-roman-world
      - context.wisdom-tradition
      # language
      - language.greek
      - language.hebrew
